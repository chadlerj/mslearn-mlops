name: Deploy model to online endpoint (PR comment)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  deploy-prod:
    if: >-
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/deploy-prod')
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sign in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI
        run: |
          az extension add -n ml -y

      - name: Register required resource providers
        run: |
          for ns in \
            Microsoft.MachineLearningServices \
            Microsoft.ContainerRegistry \
            Microsoft.ContainerInstance \
            Microsoft.OperationalInsights \
            Microsoft.OperationsManagement \
            Microsoft.Network \
            Microsoft.Compute \
            Microsoft.Storage \
            Microsoft.KeyVault; do
            STATE=$(az provider show --namespace "$ns" --query registrationState -o tsv 2>/dev/null || echo "Unknown")
            echo "$ns: $STATE"
            if [ "$STATE" != "Registered" ]; then
              echo "  -> Registering $ns..."
              az provider register --namespace "$ns" --wait || echo "  -> WARNING: could not register $ns (insufficient permissions?)"
            fi
          done

      - name: Detect Azure ML workspace
        id: detect
        run: |
          RG_NAME=$(az group list --query "[?starts_with(name,'rg-ai300-l')].name | [0]" -o tsv)
          if [ -z "$RG_NAME" ]; then
            echo "No resource group starting with rg-ai300-l found." >&2
            exit 1
          fi

          WS_NAME=$(az ml workspace list --resource-group "$RG_NAME" --query "[?starts_with(name,'mlw-ai300-l')].name | [0]" -o tsv)
          if [ -z "$WS_NAME" ]; then
            echo "No workspace starting with mlw-ai300-l found in $RG_NAME." >&2
            exit 1
          fi

          SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          # Derive a region-unique endpoint name from the workspace's unique suffix
          WS_SUFFIX=$(echo "$WS_NAME" | sed 's/mlw-ai300-l//')
          ENDPOINT_NAME="diabetes-$(echo "$WS_SUFFIX" | cut -c1-16)"

          echo "resource_group=$RG_NAME" >> "$GITHUB_OUTPUT"
          echo "workspace=$WS_NAME" >> "$GITHUB_OUTPUT"
          echo "subscription_id=$SUBSCRIPTION_ID" >> "$GITHUB_OUTPUT"
          echo "endpoint_name=$ENDPOINT_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy model to managed online endpoint
        id: deploy
        run: |
          ENDPOINT="${{ steps.detect.outputs.endpoint_name }}"
          RG="${{ steps.detect.outputs.resource_group }}"
          WS="${{ steps.detect.outputs.workspace }}"
          SUB="${{ steps.detect.outputs.subscription_id }}"

          # Register the MLflow model
          az ml model create \
            --name diabetes-model \
            --path ./model \
            --type mlflow_model \
            --resource-group "$RG" \
            --workspace-name "$WS" \
            --subscription "$SUB"

          MODEL_VERSION=$(az ml model list \
            --name diabetes-model \
            --resource-group "$RG" \
            --workspace-name "$WS" \
            --subscription "$SUB" \
            --query "[-1].version" -o tsv)

          # Create endpoint (ignore error if it already exists)
          az ml online-endpoint create \
            --name "$ENDPOINT" \
            --auth-mode key \
            --resource-group "$RG" \
            --workspace-name "$WS" \
            --subscription "$SUB" \
          || echo "Endpoint may already exist, continuing..."

          # Create or update deployment
          az ml online-deployment create \
            --name blue \
            --endpoint-name "$ENDPOINT" \
            --model "azureml:diabetes-model:$MODEL_VERSION" \
            --instance-type Standard_DS2_v2 \
            --instance-count 1 \
            --resource-group "$RG" \
            --workspace-name "$WS" \
            --subscription "$SUB"

          # Route all traffic to blue
          az ml online-endpoint update \
            --name "$ENDPOINT" \
            --traffic "blue=100" \
            --resource-group "$RG" \
            --workspace-name "$WS" \
            --subscription "$SUB"

          SCORING_URI=$(az ml online-endpoint show \
            --name "$ENDPOINT" \
            --resource-group "$RG" \
            --workspace-name "$WS" \
            --subscription "$SUB" \
            --query scoring_uri -o tsv)
          echo "Deployment complete. Scoring URI: $SCORING_URI"

      - name: Comment deployment result on pull request
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const body = [
              '🚀 Deployment workflow completed.',
              '',
              'The diabetes model has been deployed (or updated) on the managed online endpoint.',
              '',
              'Check the workflow run logs for the endpoint scoring URI and verify the endpoint in Azure Machine Learning studio.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
